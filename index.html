<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Đoán Màu - Mastermind</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay" id="overlay"></div>
    
    <div class="app-wrapper">
        <header>
            <h1>MASTERMIND</h1>
            <p>Cấp độ <input type="number" id="level-input" value="1" min="1" max="200"> | Giải mã bí mật <span id="holes-display">4</span> màu trong <span id="rows-display">7</span> lượt</p>
        </header>

        <main class="game-container">
            <div class="board" id="board">
                <!-- Rows will be generated by JS -->
            </div>

            <div class="controls">
                <div class="palette" id="palette">
                    <!-- Colors will be generated by JS -->
                </div>
                
                <div class="actions">
                    <button id="btn-delete" class="btn btn-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        Xóa
                    </button>
                    <button id="btn-submit" class="btn btn-primary">
                        Kiểm tra
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal cho kết quả -->
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2 id="modal-title">Bạn đã thắng! 🎉</h2>
            <p id="modal-message">Tuyệt vời, bạn đã giải mã thành công.</p>
            
            <div class="secret-reveal">
                <p>Mã bí mật là:</p>
                <div class="secret-code" id="secret-code-display">
                    <!-- Secret code will be shown here -->
                </div>
            </div>

            <button id="btn-restart" class="btn btn-primary btn-large">Chơi Lại</button>
        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
